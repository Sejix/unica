name: Build Unica Codex Plugin

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".agents/plugins/marketplace.json"
      - ".github/workflows/unica-plugin-release.yml"
      - "plugins/unica/**"
      - "scripts/ci/**"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-tools:
    name: Build tools (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: win-x64
            runner: windows-latest
          - target: darwin-arm64
            runner: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build target bundle
        run: >
          python scripts/ci/build-unica-tools.py
          --target "${{ matrix.target }}"
          --lock-file "plugins/unica/third-party/tools.lock.json"
          --out-dir ".build/tool-bundles/${{ matrix.target }}"
          --work-dir ".build/tool-work/${{ matrix.target }}"

      - uses: actions/upload-artifact@v4
        with:
          name: unica-tools-${{ matrix.target }}
          path: .build/tool-bundles/${{ matrix.target }}
          if-no-files-found: error

  package:
    name: Package Codex marketplace
    runs-on: ubuntu-latest
    needs: build-tools

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: unica-tools-*
          path: .build/tool-artifacts

      - name: Assemble marketplace package
        run: >
          python scripts/ci/package-unica-plugin.py
          --repo-root .
          --tools-root .build/tool-artifacts
          --lock-file plugins/unica/third-party/tools.lock.json
          --out-dir dist

      - uses: actions/upload-artifact@v4
        with:
          name: unica-codex-marketplace
          path: |
            dist/unica-codex-marketplace-*.tar.gz
            dist/unica-codex-marketplace-*.zip
          if-no-files-found: error

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/unica-codex-marketplace-*.tar.gz
            dist/unica-codex-marketplace-*.zip
