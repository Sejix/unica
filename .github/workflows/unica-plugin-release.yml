name: Build Unica Codex Plugin

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".agents/plugins/marketplace.json"
      - ".github/workflows/unica-plugin-release.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/unica-coder/**"
      - "plugins/unica/**"
      - "scripts/ci/**"
      - "scripts/install-unica.sh"
      - "tests/ci/**"
      - "tests/fixtures/**"
      - "spec/**"
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  classify-changes:
    name: Classify CI scope
    runs-on: ubuntu-latest
    outputs:
      release_artifacts: ${{ steps.scope.outputs.release_artifacts }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: scope
        name: Decide release artifact scope
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "release_artifacts=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          changed_files="$(git diff --name-only FETCH_HEAD...HEAD)"
          printf '%s\n' "$changed_files"

          release_artifacts="$(printf '%s\n' "$changed_files" | python scripts/ci/classify-workflow-changes.py)"
          echo "release_artifacts=$release_artifacts" >> "$GITHUB_OUTPUT"

  verify-source:
    name: Verify source guardrails
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python test dependencies
        run: python -m pip install -r tests/ci/requirements.txt

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Test CI helper scripts
        run: python -m unittest discover -s tests/ci

      - name: Compile Python checks
        run: python -m py_compile scripts/ci/*.py tests/ci/*.py

      - name: Validate plugin JSON manifests
        run: |
          python -m json.tool plugins/unica/.codex-plugin/plugin.json >/dev/null
          python -m json.tool plugins/unica/.mcp.json >/dev/null
          python -m json.tool plugins/unica/third-party/tools.lock.json >/dev/null
          python -m json.tool plugins/unica/third-party/manifest.json >/dev/null

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Run Rust clippy
        run: cargo clippy --package unica-coder --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        run: cargo test --package unica-coder

  build-tools:
    name: Build tools (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs:
      - verify-source
      - classify-changes
    if: ${{ github.event_name != 'pull_request' || needs.classify-changes.outputs.release_artifacts == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: win-x64
            runner: windows-latest
          - target: darwin-arm64
            runner: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Build target bundle
        run: >
          python scripts/ci/build-unica-tools.py
          --target "${{ matrix.target }}"
          --lock-file "plugins/unica/third-party/tools.lock.json"
          --out-dir ".build/tool-bundles/${{ matrix.target }}"
          --work-dir ".build/tool-work/${{ matrix.target }}"

      - uses: actions/upload-artifact@v4
        with:
          name: unica-tools-${{ matrix.target }}
          path: .build/tool-bundles/${{ matrix.target }}
          if-no-files-found: error

  package:
    name: Package Codex marketplace (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: build-tools
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux-x64
          - win-x64
          - darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: unica-tools-${{ matrix.target }}
          path: .build/tool-artifacts/unica-tools-${{ matrix.target }}

      - name: Assemble marketplace package
        run: >
          python scripts/ci/package-unica-plugin.py
          --repo-root .
          --tools-root .build/tool-artifacts
          --lock-file plugins/unica/third-party/tools.lock.json
          --out-dir dist
          --target "${{ matrix.target }}"
          --allow-partial-targets

      - uses: actions/upload-artifact@v4
        with:
          name: unica-codex-marketplace-${{ matrix.target }}
          path: |
            dist/unica-codex-marketplace-${{ matrix.target }}.tar.gz
            dist/unica-codex-marketplace-${{ matrix.target }}.zip
          if-no-files-found: error

  installer:
    name: Package installer script
    runs-on: ubuntu-latest
    needs: classify-changes
    if: ${{ github.event_name != 'pull_request' || needs.classify-changes.outputs.release_artifacts == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Stage installer
        run: |
          mkdir -p dist
          cp scripts/install-unica.sh dist/install-unica.sh

      - uses: actions/upload-artifact@v4
        with:
          name: unica-installer
          path: dist/install-unica.sh
          if-no-files-found: error

  release-assessment:
    name: Assess release candidate on BSP
    runs-on: ubuntu-latest
    needs: package

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          name: unica-codex-marketplace-linux-x64
          path: dist/linux-x64

      - name: Run release assessment
        run: >
          python scripts/ci/release-assessment.py
          --package-archive dist/linux-x64/unica-codex-marketplace-linux-x64.tar.gz
          --work-dir .build/release-assessment
          --out-dir dist/release-assessment
          --bsp-ref 3.2.1.446
          --release-tag "${{ github.ref_name }}"
          --github-run-id "${{ github.run_id }}"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unica-release-assessment
          path: dist/release-assessment
          if-no-files-found: error

  publish-assessment-pages:
    name: Publish assessment pages
    runs-on: ubuntu-latest
    needs: release-assessment
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: unica-release-assessment
          path: dist/release-assessment

      - name: Prepare gh-pages content
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          repo_url="https://github.com/${GITHUB_REPOSITORY}.git"
          auth_header="AUTHORIZATION: bearer ${GITHUB_TOKEN}"

          if git -c "http.extraheader=${auth_header}" ls-remote --exit-code --heads "$repo_url" gh-pages >/dev/null 2>&1; then
            git -c "http.extraheader=${auth_header}" clone --depth 1 --branch gh-pages "$repo_url" pages-site
          else
            mkdir -p pages-site
            git -C pages-site init
            git -C pages-site checkout --orphan gh-pages
            git -C pages-site remote add origin "$repo_url"
          fi

          mkdir -p pages-site/assessments
          rm -rf "pages-site/assessments/${GITHUB_REF_NAME}" pages-site/assessments/latest
          cp -R dist/release-assessment "pages-site/assessments/${GITHUB_REF_NAME}"
          cp -R dist/release-assessment pages-site/assessments/latest
          cat > pages-site/assessments/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head><meta charset="utf-8"><title>Unica Release Assessments</title></head>
          <body><h1>Unica Release Assessments</h1><p>Open a versioned assessment folder or <a href="latest/">latest</a>.</p></body>
          </html>
          HTML

          git -C pages-site config user.name "github-actions[bot]"
          git -C pages-site config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C pages-site add assessments
          if git -C pages-site diff --cached --quiet; then
            echo "No assessment page changes to publish."
          else
            git -C pages-site commit -m "docs: publish assessment ${GITHUB_REF_NAME}"
            git -C pages-site -c "http.extraheader=${auth_header}" push origin HEAD:gh-pages
          fi
          rm -rf pages-site/.git

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site

      - id: deployment
        uses: actions/deploy-pages@v4

  publish-release-assets:
    name: Publish release assets (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs:
      - package
      - publish-assessment-pages
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux-x64
          - win-x64
          - darwin-arm64

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: unica-codex-marketplace-${{ matrix.target }}
          path: dist/${{ matrix.target }}

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.target }}/unica-codex-marketplace-${{ matrix.target }}.tar.gz
            dist/${{ matrix.target }}/unica-codex-marketplace-${{ matrix.target }}.zip

  publish-installer-asset:
    name: Publish installer asset
    runs-on: ubuntu-latest
    needs:
      - installer
      - publish-assessment-pages
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: unica-installer
          path: dist/installer

      - name: Publish installer asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/installer/install-unica.sh
